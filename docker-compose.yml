services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: tier1user
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: assessments
    ports:
      - "5433:5433"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tier1user -d assessments"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: uvicorn api.receiver:app --host 0.0.0.0 --port 8080 --reload
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - default
      - assessment_backend

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: python -m celery -A worker.celery_app worker --loglevel=info --queues=tier1 --concurrency=2
    env_file: .env
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - default
      - assessment_backend

  flower:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: python -m celery -A worker.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis

volumes:
  pg_data:

networks:
  assessment_backend:
    external: true
    name: assessment-backend_assessment-network
